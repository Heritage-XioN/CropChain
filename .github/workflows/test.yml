name: Test Smart Contract

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            smart-contract/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('smart-contract/programs/crop-batch/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"
          cache-dependency-path: "smart-contract/yarn.lock"

      - name: Install Yarn Dependencies
        working-directory: ./smart-contract
        run: yarn install --frozen-lockfile

      - name: Set up Solana and Anchor
        uses: metadaoproject/setup-anchor@v3.1
        with:
          anchor-version: "1.0.2"
          solana-cli-version: "3.1.10"
          node-version: "22"

      - name: Generate Solana Keypair
        run: |
          mkdir -p ~/.config/solana
          solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json
          solana config set --keypair ~/.config/solana/id.json

      - name: Rust Code Format Check
        working-directory: ./smart-contract/programs/crop-batch
        run: cargo fmt -- --check

      - name: Rust Lint Check (Clippy)
        working-directory: ./smart-contract/programs/crop-batch
        run: cargo clippy -- -D warnings

      - name: Run Tests (Unit & Integration)
        working-directory: ./smart-contract
        run: anchor test
